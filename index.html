<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Caça Estátuas SP — Mapa Fácil</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
<style>
:root{
  --ink:#161616;
  --paper:#ffffff;
  --panel:#f4f2ee;
  --line:#161616;
  --red:#E31937;
  --red-dark:#B4102A;
  --gold:#C9962C;
  --silver:#7C868F;
  --teal:#0F8B7E;
  --muted:#6b6b6b;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);
  background:var(--panel);
  overflow:hidden;
}
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ---------- HEADER ---------- */
header.top{
  position:relative;
  background:var(--red);
  color:#fff;
  padding:14px 18px 16px;
  border-bottom:4px solid var(--ink);
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.18) 1.4px, transparent 1.4px);
  background-size:14px 14px;
  z-index:20;
  flex-shrink:0;
}
.top-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
h1{
  margin:0;
  font-size:19px;
  font-weight:900;
  letter-spacing:-0.01em;
  text-shadow:2px 2px 0 var(--ink);
  display:flex;
  align-items:center;
  gap:8px;
}
h1 .sub{
  display:block;
  font-size:11px;
  font-weight:600;
  text-shadow:none;
  opacity:0.92;
  margin-top:2px;
  letter-spacing:0;
}
.stats{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.pill{
  background:#fff;
  color:var(--ink);
  border:2.5px solid var(--ink);
  border-radius:999px;
  padding:6px 12px;
  font-size:12px;
  font-weight:800;
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
  box-shadow:2px 2px 0 rgba(0,0,0,0.25);
}
.pill .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.pill.you{background:var(--ink);color:#fff;}

/* ---------- LAYOUT ---------- */
.body-wrap{
  flex:1;
  display:flex;
  min-height:0;
  position:relative;
}
#map{
  flex:1;
  min-width:0;
  position:relative;
  background:#e8e6df;
  background-image:linear-gradient(45deg,#dedbd3 25%,transparent 25%,transparent 75%,#dedbd3 75%),
                   linear-gradient(45deg,#dedbd3 25%,transparent 25%,transparent 75%,#dedbd3 75%);
  background-size:22px 22px;
  background-position:0 0,11px 11px;
}
aside.panel{
  width:360px;
  max-width:90vw;
  background:var(--paper);
  border-right:4px solid var(--ink);
  display:flex;
  flex-direction:column;
  z-index:15;
  min-height:0;
}

/* ---------- CONTROLS ---------- */
.controls{
  padding:12px 14px 10px;
  border-bottom:2px solid #e3e0d8;
  flex-shrink:0;
}
.search-box{
  position:relative;
  margin-bottom:10px;
}
.search-box input{
  width:100%;
  padding:10px 12px 10px 34px;
  border:2.5px solid var(--ink);
  border-radius:10px;
  font-size:14px;
  font-weight:600;
  outline:none;
  background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="%23161616" stroke-width="2.4"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.2" y1="10.2" x2="15" y2="15"/></svg>') no-repeat 10px center;
}
.search-box input:focus{
  border-color:var(--red);
  box-shadow:0 0 0 3px rgba(227,25,55,0.15);
}
.chip-row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:8px;
}
.chip{
  border:2px solid var(--ink);
  background:#fff;
  border-radius:999px;
  padding:5px 11px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  user-select:none;
  transition:transform .08s ease;
  display:inline-flex;
  align-items:center;
  gap:5px;
}
.chip:active{transform:scale(0.95);}
.chip.active{background:var(--ink);color:#fff;}
.chip .swatch{width:9px;height:9px;border-radius:50%;display:inline-block;}
.chip.tier-gold.active{background:var(--gold);border-color:var(--gold);}
.chip.tier-silver.active{background:var(--silver);border-color:var(--silver);}
.chip.tier-colored.active{background:var(--teal);border-color:var(--teal);}

.near-btn{
  width:100%;
  padding:10px;
  border:2.5px solid var(--ink);
  border-radius:10px;
  background:var(--ink);
  color:#fff;
  font-weight:800;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.near-btn:active{transform:translateY(1px);}
.near-btn.locating{opacity:0.7;}

.result-count{
  font-size:11.5px;
  color:var(--muted);
  font-weight:700;
  padding:8px 14px 4px;
  flex-shrink:0;
}

/* ---------- LIST ---------- */
.list{
  flex:1;
  overflow-y:auto;
  padding:4px 10px 16px;
}
.card{
  display:flex;
  gap:10px;
  padding:10px;
  border:2px solid transparent;
  border-radius:12px;
  margin-bottom:6px;
  cursor:pointer;
  align-items:flex-start;
  background:#fff;
}
.card:hover{background:var(--panel);}
.card.active{border-color:var(--red);background:#fff5f6;}
.card.collected{opacity:0.55;}
.badge{
  flex-shrink:0;
  width:34px;height:34px;
  border-radius:50%;
  border:2.5px solid var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  font-weight:900;
  color:#fff;
  margin-top:1px;
}
.card-body{flex:1;min-width:0;}
.card-title{
  font-weight:800;
  font-size:13.5px;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}
.card-local{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.tag{
  font-size:9.5px;
  font-weight:800;
  padding:1px 6px;
  border-radius:999px;
  border:1.5px solid var(--ink);
  text-transform:uppercase;
  letter-spacing:0.02em;
}
.tag.new{background:var(--red);color:#fff;border-color:var(--red);}
.tag.notinstalled{background:#fff;color:var(--muted);border-style:dashed;}
.dist{
  font-size:11px;
  font-weight:800;
  color:var(--red-dark);
  margin-top:3px;
}
.check{
  flex-shrink:0;
  width:26px;height:26px;
  border-radius:8px;
  border:2px solid var(--ink);
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:14px;
  margin-top:2px;
}
.check.on{background:#1FA05A;border-color:#1FA05A;color:#fff;}

.empty-state{
  text-align:center;
  padding:40px 20px;
  color:var(--muted);
  font-size:13px;
  font-weight:600;
}

/* ---------- MOBILE DRAWER ---------- */
.drawer-handle{display:none;}
.mobile-toggle{display:none;}

@media (max-width:760px){
  .body-wrap{flex-direction:column;}
  aside.panel{
    width:100%;
    max-width:100%;
    order:2;
    position:absolute;
    left:0;right:0;bottom:0;
    top:auto;
    height:60vh;
    border-right:none;
    border-top:4px solid var(--ink);
    border-radius:18px 18px 0 0;
    transform:translateY(calc(100% - 108px));
    transition:transform .28s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 -6px 20px rgba(0,0,0,0.25);
  }
  aside.panel.open{transform:translateY(0);}
  #map{position:absolute;inset:0;}
  .drawer-handle{
    display:flex;
    justify-content:center;
    padding:8px 0 4px;
    cursor:grab;
    flex-shrink:0;
  }
  .drawer-handle .bar{
    width:44px;height:5px;border-radius:3px;background:#d8d4c8;
  }
  h1{font-size:16px;}
  h1 .sub{font-size:10px;}
}

/* ---------- LEAFLET OVERRIDES ---------- */
.leaflet-container{font-family:inherit;}
.statue-pin{
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  border:2.5px solid var(--ink);
  display:flex;align-items:center;justify-content:center;
  box-shadow:1px 1px 0 rgba(0,0,0,0.3);
}
.statue-pin .inner{
  transform:rotate(45deg);
  font-size:13px;
  font-weight:900;
  color:#fff;
}
.statue-pin.faded{opacity:0.45;}
.statue-pin.done{filter:grayscale(0.3);}
.marker-cluster-custom{
  background:var(--ink);
  border:3px solid #fff;
  border-radius:50%;
  color:#fff;
  font-weight:800;
  font-size:12px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:2px 2px 0 rgba(0,0,0,0.25);
}
.leaflet-popup-content-wrapper{
  border-radius:12px;
  border:2.5px solid var(--ink);
  box-shadow:3px 3px 0 rgba(0,0,0,0.2);
}
.leaflet-popup-tip{border:2.5px solid var(--ink);}
.popup-title{font-weight:900;font-size:15px;margin:0 0 3px;}
.popup-local{font-size:12px;color:var(--muted);margin:0 0 6px;font-weight:600;}
.popup-desc{font-size:12px;line-height:1.4;margin:0 0 8px;}
.popup-actions{display:flex;gap:6px;flex-wrap:wrap;}
.popup-actions a, .popup-actions button{
  font-size:11.5px;
  font-weight:800;
  border:2px solid var(--ink);
  border-radius:8px;
  padding:5px 9px;
  text-decoration:none;
  color:var(--ink);
  background:#fff;
  cursor:pointer;
}
.popup-actions button.on{background:#1FA05A;color:#fff;border-color:#1FA05A;}
.user-loc-pin{
  width:16px;height:16px;border-radius:50%;
  background:#1a73e8;border:3px solid #fff;
  box-shadow:0 0 0 3px rgba(26,115,232,0.35);
}
.leaflet-control-zoom{border:2.5px solid var(--ink) !important;border-radius:10px !important;overflow:hidden;}
.leaflet-control-zoom a{color:var(--ink) !important;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#d8d4c8;border-radius:4px;}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="top-row">
      <h1>🐾 Caça Estátuas SP
        <span class="sub">mapa não-oficial • dados da promoção da Prefeitura</span>
      </h1>
      <div class="stats">
        <span class="pill"><span class="dot" style="background:var(--red)"></span><span id="statInstalled">0/0</span> instaladas</span>
        <span class="pill you">✓ <span id="statCollected">0/0</span> coletadas por você</span>
      </div>
    </div>
  </header>

  <div class="body-wrap">
    <div id="map"></div>

    <aside class="panel" id="panel">
      <div class="drawer-handle" id="drawerHandle"><span class="bar"></span></div>
      <div class="controls">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar personagem ou praça...">
        </div>
        <div class="chip-row" id="statusChips">
          <span class="chip active" data-status="installed">Instaladas</span>
          <span class="chip" data-status="all">Todas</span>
          <span class="chip" data-status="missing">Ainda vêm</span>
        </div>
        <div class="chip-row" id="tierChips">
          <span class="chip tier-gold" data-tier="gold"><span class="swatch" style="background:var(--gold)"></span>Ouro</span>
          <span class="chip tier-silver" data-tier="silver"><span class="swatch" style="background:var(--silver)"></span>Prata</span>
          <span class="chip tier-colored" data-tier="colored"><span class="swatch" style="background:var(--teal)"></span>Pintada</span>
        </div>
        <div class="chip-row">
          <span class="chip" id="hideCollectedChip">Esconder já coletadas</span>
        </div>
        <button class="near-btn" id="nearBtn">📍 Estátuas perto de mim</button>
      </div>
      <div class="result-count" id="resultCount"></div>
      <div class="list" id="list"></div>
    </aside>
  </div>
</div>

const TIER_COLOR = { gold:'#C9962C', silver:'#7C868F', colored:'#0F8B7E' };
const TIER_LABEL = { gold:'Ouro', silver:'Prata', colored:'Pintada' };

let collected = new Set();
let userLoc = null;
let activeId = null;
let statusFilter = 'installed'; // installed | all | missing
let tierFilters = new Set();    // empty = all tiers
let hideCollected = false;
let searchTerm = '';

// ---------- storage (persists via Claude artifact storage) ----------
async function loadCollected(){
  try{
    const res = await window.storage.get('collected-statues', false);
    if(res && res.value){
      collected = new Set(JSON.parse(res.value));
    }
  }catch(e){
    collected = new Set();
  }
}
async function saveCollected(){
  try{
    await window.storage.set('collected-statues', JSON.stringify([...collected]), false);
  }catch(e){
    console.error('Não foi possível salvar seu progresso', e);
  }
}

function normalize(str){
  return (str||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ---------- map ----------
const map = L.map('map',{zoomControl:true, minZoom:10, maxZoom:19}).setView([-23.5505,-46.6333], 12);

// Tile providers, tried in order. If one fails to load, fall through to the next.
const TILE_PROVIDERS = [
  { url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    attr:'&copy; OpenStreetMap', name:'OpenStreetMap' },
  { url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    attr:'&copy; OpenStreetMap &copy; CARTO', name:'CARTO' },
  { url:'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
    attr:'&copy; OpenStreetMap contributors', name:'OSM France' }
];

let tileLayer = null;
let providerIdx = 0;
let tilesOk = false;

function showTileWarning(){
  if(document.getElementById('tileWarn')) return;
  const div = document.createElement('div');
  div.id = 'tileWarn';
  div.style.cssText = 'position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:900;background:#fff;border:2.5px solid #161616;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:700;max-width:88%;box-shadow:2px 2px 0 rgba(0,0,0,.25);line-height:1.45;';
  div.innerHTML = 'O mapa de ruas não carregou aqui — o sandbox do Claude bloqueia os servidores de tiles.<br><span style="font-weight:600">Baixe este arquivo e abra no seu navegador: funciona normal.</span>';
  document.getElementById('map').appendChild(div);
}

function loadProvider(i){
  if(i >= TILE_PROVIDERS.length){ showTileWarning(); return; }
  providerIdx = i;
  if(tileLayer) map.removeLayer(tileLayer);
  const p = TILE_PROVIDERS[i];
  tileLayer = L.tileLayer(p.url, { attribution:p.attr, maxZoom:19, crossOrigin:true });
  tileLayer.on('tileload', ()=>{ tilesOk = true; document.getElementById('tileWarn')?.remove(); });
  tileLayer.on('tileerror', ()=>{ if(!tilesOk) loadProvider(i+1); });
  tileLayer.addTo(map);
}
loadProvider(0);
setTimeout(()=>{ if(!tilesOk) showTileWarning(); }, 4000);

const clusterGroup = L.markerClusterGroup({
  maxClusterRadius:50,
  iconCreateFunction:function(cluster){
    const count = cluster.getChildCount();
    const size = count < 10 ? 34 : count < 30 ? 40 : 46;
    return L.divIcon({
      html:`<div class="marker-cluster-custom" style="width:${size}px;height:${size}px;">${count}</div>`,
      className:'', iconSize:[size,size]
    });
  }
});
map.addLayer(clusterGroup);

let userMarker = null;

function pinIcon(statue){
  const color = TIER_COLOR[statue.tier] || '#333';
  const initial = statue.name.replace(/\s*\(.*?\)\s*/g,'').trim().charAt(0);
  const faded = !statue.installed ? 'faded' : '';
  const done = collected.has(statue.id) ? 'done' : '';
  const size = 30;
  const html = `<div class="statue-pin ${faded} ${done}" style="width:${size}px;height:${size}px;background:${color};">
      <span class="inner">${collected.has(statue.id) ? '✓' : initial}</span>
    </div>`;
  return L.divIcon({ html, className:'', iconSize:[size,size], iconAnchor:[size/2,size] });
}

const markerById = {};

function buildMarkers(){
  clusterGroup.clearLayers();
  for(const key in markerById) delete markerById[key];
  STATUES.forEach(s=>{
    const m = L.marker([s.lat, s.lng], { icon: pinIcon(s) });
    m.on('click', ()=> selectStatue(s.id, true));
    m.bindPopup(popupHtml(s));
    markerById[s.id] = m;
    clusterGroup.addLayer(m);
  });
}

function popupHtml(s){
  const gmaps = `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`;
  const isOn = collected.has(s.id);
  return `<div>
    <p class="popup-title">${s.name}</p>
    <p class="popup-local">${s.local}${!s.installed ? ' · <em>ainda não instalada</em>' : ''}</p>
    <p class="popup-desc">${s.desc}</p>
    <div class="popup-actions">
      <a href="${gmaps}" target="_blank" rel="noopener">🧭 Google Maps</a>
      <button data-toggle="${s.id}" class="${isOn?'on':''}">${isOn ? '✓ Coletada' : 'Marcar coletada'}</button>
    </div>
  </div>`;
}

map.on('popupopen', (e)=>{
  const btn = e.popup._contentNode.querySelector('button[data-toggle]');
  if(btn){
    btn.addEventListener('click', ()=> toggleCollected(btn.getAttribute('data-toggle')));
  }
});

// ---------- list ----------
function matchesFilters(s){
  if(statusFilter==='installed' && !s.installed) return false;
  if(statusFilter==='missing' && s.installed) return false;
  if(tierFilters.size>0 && !tierFilters.has(s.tier)) return false;
  if(hideCollected && collected.has(s.id)) return false;
  if(searchTerm){
    const hay = normalize(s.name+' '+s.local);
    if(!hay.includes(normalize(searchTerm))) return false;
  }
  return true;
}

function renderList(){
  const listEl = document.getElementById('list');
  let items = STATUES.filter(matchesFilters);

  if(userLoc){
    items = items.map(s=>({...s, _dist:haversine(userLoc.lat,userLoc.lng,s.lat,s.lng)}));
    items.sort((a,b)=>a._dist-b._dist);
  } else {
    items = items.slice().sort((a,b)=> a.name.localeCompare(b.name,'pt-BR'));
  }

  document.getElementById('resultCount').textContent = `${items.length} estátua${items.length===1?'':'s'} encontrada${items.length===1?'':'s'}`;

  if(items.length===0){
    listEl.innerHTML = `<div class="empty-state">Nenhuma estátua encontrada com esses filtros.<br>Tenta ajustar a busca 🔍</div>`;
    return;
  }

  listEl.innerHTML = items.map(s=>{
    const color = TIER_COLOR[s.tier];
    const isOn = collected.has(s.id);
    const initial = s.name.replace(/\s*\(.*?\)\s*/g,'').trim().charAt(0);
    return `<div class="card ${activeId===s.id?'active':''} ${isOn?'collected':''}" data-id="${s.id}">
      <div class="badge" style="background:${color};">${isOn?'✓':initial}</div>
      <div class="card-body">
        <div class="card-title">${s.name}
          ${s.isNew ? '<span class="tag new">nova</span>':''}
          ${!s.installed ? '<span class="tag notinstalled">a instalar</span>':''}
        </div>
        <div class="card-local">${s.local}</div>
        ${s._dist!==undefined ? `<div class="dist">📍 ${s._dist<1 ? Math.round(s._dist*1000)+' m' : s._dist.toFixed(1)+' km'}</div>` : ''}
      </div>
      <div class="check ${isOn?'on':''}" data-check="${s.id}">${isOn?'✓':''}</div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',(e)=>{
      if(e.target.closest('[data-check]')) return;
      selectStatue(card.getAttribute('data-id'), false);
    });
  });
  listEl.querySelectorAll('[data-check]').forEach(chk=>{
    chk.addEventListener('click',(e)=>{
      e.stopPropagation();
      toggleCollected(chk.getAttribute('data-check'));
    });
  });
}

function selectStatue(id, fromMap){
  activeId = id;
  const s = STATUES.find(x=>x.id===id);
  if(!s) return;
  map.flyTo([s.lat,s.lng], Math.max(map.getZoom(),16), {duration:0.6});
  const marker = markerById[id];
  if(marker){
    clusterGroup.zoomToShowLayer(marker, ()=> marker.openPopup());
  }
  if(!fromMap){
    renderList();
    document.querySelector(`.card[data-id="${id}"]`)?.scrollIntoView({block:'nearest'});
  } else {
    renderList();
  }
  if(window.innerWidth<=760){
    document.getElementById('panel').classList.remove('open');
  }
}

async function toggleCollected(id){
  if(collected.has(id)) collected.delete(id); else collected.add(id);
  await saveCollected();
  buildMarkers();
  renderList();
  updateStats();
  const marker = markerById[id];
  if(marker && marker.isPopupOpen()){
    marker.setPopupContent(popupHtml(STATUES.find(s=>s.id===id)));
  }
}

function updateStats(){
  const installed = STATUES.filter(s=>s.installed).length;
  document.getElementById('statInstalled').textContent = `${installed}/${STATUES.length}`;
  document.getElementById('statCollected').textContent = `${collected.size}/${STATUES.length}`;
}

document.getElementById('statusChips').addEventListener('click',(e)=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  statusFilter = chip.getAttribute('data-status');
  document.querySelectorAll('#statusChips .chip').forEach(c=>c.classList.toggle('active', c===chip));
  buildMarkers();
  renderList();
});
document.getElementById('tierChips').addEventListener('click',(e)=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  const tier = chip.getAttribute('data-tier');
  if(tierFilters.has(tier)){ tierFilters.delete(tier); chip.classList.remove('active'); }
  else { tierFilters.add(tier); chip.classList.add('active'); }
  renderList();
});
document.getElementById('hideCollectedChip').addEventListener('click',(e)=>{
  hideCollected = !hideCollected;
  e.target.classList.toggle('active', hideCollected);
  renderList();
});
document.getElementById('searchInput').addEventListener('input',(e)=>{
  searchTerm = e.target.value;
  renderList();
});

// ---------- geolocation ----------
document.getElementById('nearBtn').addEventListener('click', ()=>{
  const btn = document.getElementById('nearBtn');
  if(!navigator.geolocation){
    alert('Seu navegador não suporta geolocalização.');
    return;
  }
  btn.classList.add('locating');
  btn.textContent = '📍 Localizando...';
  navigator.geolocation.getCurrentPosition(pos=>{
    userLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    btn.classList.remove('locating');
    btn.textContent = '📍 Estátuas perto de mim ✓';
    if(userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([userLoc.lat,userLoc.lng],{
      icon: L.divIcon({ html:'<div class="user-loc-pin"></div>', className:'', iconSize:[16,16] })
    }).addTo(map).bindPopup('Você está aqui');
    map.flyTo([userLoc.lat,userLoc.lng], 14, {duration:0.6});
    renderList();
  }, err=>{
    btn.classList.remove('locating');
    btn.textContent = '📍 Estátuas perto de mim';
    alert('Não foi possível obter sua localização. Verifique as permissões do navegador.');
  }, { enableHighAccuracy:true, timeout:10000 });
});

// ---------- mobile drawer ----------
const panel = document.getElementById('panel');
const handle = document.getElementById('drawerHandle');
handle.addEventListener('click', ()=> panel.classList.toggle('open'));

// ---------- init ----------
(async function init(){
  await loadCollected();
  buildMarkers();
  renderList();
  updateStats();
})();
</script>
</body>
</html>
